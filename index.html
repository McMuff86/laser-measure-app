<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Laser Measure</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0a;
            --surface: #161616;
            --border: #2a2a2a;
            --text: #e4e4e7;
            --muted: #71717a;
            --accent: #22d3ee;
            --accent-dim: rgba(34, 211, 238, 0.15);
            --success: #4ade80;
            --danger: #f87171;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 100px;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .subtitle {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--danger);
            flex-shrink: 0;
        }
        .status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.5);
        }
        .status-dot.connecting {
            background: #facc15;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 18px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.97); }
        .btn.primary {
            background: var(--accent);
            color: #0a0a0a;
            border-color: var(--accent);
            font-weight: 600;
        }
        .btn.primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn.danger {
            border-color: var(--danger);
            color: var(--danger);
        }
        .btn-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .measure-display {
            text-align: center;
            padding: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .measure-value {
            font-size: 3rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--accent);
            line-height: 1.1;
        }
        .measure-unit {
            font-size: 1.2rem;
            color: var(--muted);
            margin-left: 4px;
        }
        .measure-label {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 4px;
        }
        .door-input {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            align-items: center;
        }
        .door-input label {
            font-size: 0.85rem;
            color: var(--muted);
            white-space: nowrap;
        }
        .door-input input, .door-input select {
            flex: 1;
            padding: 10px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
        }
        .door-input input:focus, .door-input select:focus {
            border-color: var(--accent);
        }
        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .field-btn {
            padding: 12px 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .field-btn.active {
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        .field-btn .field-name {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 2px;
        }
        .field-btn .field-value {
            font-size: 1.1rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        .table-wrap {
            overflow-x: auto;
            margin-bottom: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        th {
            text-align: left;
            padding: 8px 10px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            color: var(--muted);
            font-weight: 500;
            position: sticky;
            top: 0;
            white-space: nowrap;
        }
        td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        tr:last-child td { border-bottom: none; }
        .count-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-dim);
            color: var(--accent);
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 8px;
        }
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        .manual-input {
            display: none;
            gap: 8px;
            margin-bottom: 16px;
            align-items: center;
        }
        .manual-input.show { display: flex; }
        .manual-input input {
            flex: 1;
            padding: 10px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
        }
        .log {
            font-size: 0.75rem;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            max-height: 120px;
            overflow-y: auto;
            margin-bottom: 16px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            display: none;
        }
        .log.show { display: block; }
        .empty-state {
            text-align: center;
            padding: 32px 16px;
            color: var(--muted);
            font-size: 0.9rem;
        }
        .delete-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            padding: 4px;
            font-size: 1rem;
            opacity: 0.6;
        }
        .delete-btn:active { opacity: 1; }
    </style>
</head>
<body>
    <h1>📐 Laser Measure</h1>
    <p class="subtitle">Bosch GLM 50C → Türen-Masse</p>

    <!-- Connection Status -->
    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Nicht verbunden</span>
        <div style="flex:1"></div>
        <button class="btn" id="connectBtn" onclick="toggleConnection()">Verbinden</button>
    </div>

    <!-- Last Measurement Display -->
    <div class="measure-display">
        <div class="measure-value" id="measureValue">—</div>
        <div class="measure-label" id="measureLabel">Warte auf Messung...</div>
    </div>

    <!-- Door Identifier -->
    <div class="door-input">
        <label>Tür:</label>
        <input type="text" id="doorId" placeholder="z.B. OH1-EG-101" value="">
        <select id="doorField" onchange="updateFieldButtons()">
            <option value="breite">Breite</option>
            <option value="hoehe">Höhe</option>
            <option value="wandstaerke">Wandstärke</option>
        </select>
    </div>

    <!-- Quick Field Buttons -->
    <div class="field-row" id="fieldRow">
        <div class="field-btn active" onclick="selectField('breite')">
            <div class="field-name">Breite</div>
            <div class="field-value" id="val-breite">—</div>
        </div>
        <div class="field-btn" onclick="selectField('hoehe')">
            <div class="field-name">Höhe</div>
            <div class="field-value" id="val-hoehe">—</div>
        </div>
        <div class="field-btn" onclick="selectField('wandstaerke')">
            <div class="field-name">Wandstärke</div>
            <div class="field-value" id="val-wandstaerke">—</div>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="btn-row">
        <button class="btn primary" id="measureBtn" onclick="triggerMeasure()" disabled>📏 Messen</button>
        <button class="btn" onclick="saveDoor()">💾 Tür speichern</button>
        <button class="btn" onclick="nextDoor()">➡️ Nächste</button>
        <button class="btn" onclick="toggleManual()">✏️ Manuell</button>
    </div>

    <!-- Manual Input -->
    <div class="manual-input" id="manualInput">
        <input type="number" id="manualValue" placeholder="Wert in mm" inputmode="numeric" step="1">
        <button class="btn" onclick="applyManual()">OK</button>
    </div>

    <!-- Debug Log -->
    <div class="log" id="debugLog"></div>
    <div class="btn-row">
        <button class="btn" onclick="toggleLog()" style="font-size:0.8rem">🔧 Debug Log</button>
        <button class="btn" onclick="exportCSV()" style="font-size:0.8rem">📥 CSV Export</button>
        <button class="btn danger" onclick="clearAll()" style="font-size:0.8rem">🗑️ Alle löschen</button>
    </div>

    <!-- Saved Measurements Table -->
    <div class="section-title">
        Messungen <span class="count-badge" id="countBadge">0</span>
    </div>
    <div class="table-wrap">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Tür</th>
                    <th>Breite</th>
                    <th>Höhe</th>
                    <th>Wand</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="dataBody">
            </tbody>
        </table>
        <div class="empty-state" id="emptyState">
            Noch keine Messungen gespeichert.<br>
            Verbinde das Messgerät und leg los!
        </div>
    </div>

    <script>
        // ── BLE Constants (Bosch GLM) ──
        const GLM_SERVICE_UUID    = '00005301-0000-0041-5253-534f46540000';
        const GLM_CHAR_UUID       = '00004301-0000-0041-5253-534f46540000';
        
        // Commands (same as RFCOMM protocol)
        const CMD_MEASURE    = new Uint8Array([0xC0, 0x40, 0x00, 0xEE]);
        const CMD_LASER_ON   = new Uint8Array([0xC0, 0x41, 0x00, 0x96]);
        const CMD_LASER_OFF  = new Uint8Array([0xC0, 0x42, 0x00, 0x1E]);

        // ── State ──
        let device = null;
        let characteristic = null;
        let connected = false;
        let currentField = 'breite';
        let currentDoor = { breite: null, hoehe: null, wandstaerke: null };
        let measurements = JSON.parse(localStorage.getItem('laser-measurements') || '[]');
        let notifyMode = false;

        // ── UI Helpers ──
        const $ = id => document.getElementById(id);
        
        function log(msg) {
            const el = $('debugLog');
            const time = new Date().toLocaleTimeString('de-CH');
            el.innerHTML += `[${time}] ${msg}\n`;
            el.scrollTop = el.scrollHeight;
            console.log(msg);
        }

        function setStatus(state, text) {
            $('statusDot').className = 'status-dot ' + state;
            $('statusText').textContent = text;
        }

        function updateMeasureDisplay(value) {
            if (value === null) {
                $('measureValue').textContent = '—';
                $('measureLabel').textContent = 'Warte auf Messung...';
                return;
            }
            const mm = Math.round(value);
            $('measureValue').innerHTML = `${mm}<span class="measure-unit">mm</span>`;
            $('measureLabel').textContent = `→ ${currentField} für ${$('doorId').value || '(keine Tür)'}`;
        }

        function selectField(field) {
            currentField = field;
            $('doorField').value = field;
            updateFieldButtons();
        }

        function updateFieldButtons() {
            currentField = $('doorField').value;
            document.querySelectorAll('.field-btn').forEach(btn => {
                const f = btn.querySelector('.field-name').textContent.toLowerCase().replace('ä', 'ae');
                const key = f === 'breite' ? 'breite' : f === 'höhe' ? 'hoehe' : 'wandstaerke';
                // Simplified mapping
                const fieldMap = { 'breite': 'breite', 'höhe': 'hoehe', 'wandstärke': 'wandstaerke' };
                const mapped = fieldMap[f] || f;
                btn.classList.toggle('active', mapped === currentField);
            });
        }

        function applyValue(valueMm) {
            const mm = Math.round(valueMm);
            currentDoor[currentField] = mm;
            const valEl = $('val-' + currentField);
            if (valEl) valEl.textContent = mm;
            updateMeasureDisplay(mm);
            
            // Auto-advance to next empty field
            const fields = ['breite', 'hoehe', 'wandstaerke'];
            const nextEmpty = fields.find(f => currentDoor[f] === null && f !== currentField);
            if (nextEmpty) {
                setTimeout(() => selectField(nextEmpty), 300);
            }
        }

        // ── BLE Connection ──
        async function toggleConnection() {
            if (connected) {
                disconnect();
            } else {
                await connect();
            }
        }

        async function connect() {
            if (!navigator.bluetooth) {
                log('❌ Web Bluetooth nicht unterstützt! Nutze Chrome auf Android.');
                alert('Web Bluetooth wird in diesem Browser nicht unterstützt.\nBitte Chrome auf Android nutzen.');
                return;
            }

            setStatus('connecting', 'Suche Bosch GLM...');
            $('connectBtn').textContent = 'Suche...';
            $('connectBtn').disabled = true;
            log('🔍 Starte Bluetooth-Scan...');

            try {
                // Accept all BLE devices so user can find the GLM regardless of name
                device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [GLM_SERVICE_UUID],
                });

                log(`📱 Gerät gefunden: ${device.name || 'unbekannt'}`);
                device.addEventListener('gattserverdisconnected', onDisconnected);

                setStatus('connecting', 'Verbinde...');
                const server = await device.gatt.connect();
                log('🔗 GATT verbunden');

                // Try to get the GLM service
                let service;
                try {
                    service = await server.getPrimaryService(GLM_SERVICE_UUID);
                    log('✅ GLM Service gefunden');
                } catch (e) {
                    log('⚠️ GLM Service nicht gefunden, liste Services...');
                    // Try to discover what services are available
                    try {
                        const services = await server.getPrimaryServices();
                        services.forEach(s => log(`  Service: ${s.uuid}`));
                    } catch (e2) {
                        log('  Kann Services nicht auflisten');
                    }
                    throw new Error('GLM Bluetooth Service nicht gefunden. Gerät kompatibel?');
                }

                // Get characteristic
                characteristic = await service.getCharacteristic(GLM_CHAR_UUID);
                log('✅ Characteristic gefunden');

                // Try to subscribe to notifications
                try {
                    await characteristic.startNotifications();
                    characteristic.addEventListener('characteristicvaluechanged', onNotification);
                    notifyMode = true;
                    log('✅ Notifications aktiv – Messwerte kommen automatisch');
                } catch (e) {
                    notifyMode = false;
                    log('⚠️ Notifications nicht unterstützt, nutze Polling');
                }

                connected = true;
                setStatus('connected', `Verbunden: ${device.name || 'GLM'}`);
                $('connectBtn').textContent = 'Trennen';
                $('connectBtn').disabled = false;
                $('measureBtn').disabled = false;

                // Turn laser on
                try {
                    await characteristic.writeValue(CMD_LASER_ON);
                    log('🔴 Laser eingeschaltet');
                } catch(e) {
                    log('⚠️ Laser-Befehl fehlgeschlagen: ' + e.message);
                }

            } catch (err) {
                log('❌ Fehler: ' + err.message);
                setStatus('', 'Verbindung fehlgeschlagen');
                $('connectBtn').textContent = 'Verbinden';
                $('connectBtn').disabled = false;
                if (err.message.includes('User cancelled')) {
                    setStatus('', 'Abgebrochen');
                }
            }
        }

        function disconnect() {
            if (device && device.gatt.connected) {
                device.gatt.disconnect();
            }
            onDisconnected();
        }

        function onDisconnected() {
            connected = false;
            characteristic = null;
            notifyMode = false;
            setStatus('', 'Getrennt');
            $('connectBtn').textContent = 'Verbinden';
            $('connectBtn').disabled = false;
            $('measureBtn').disabled = true;
            log('🔌 Verbindung getrennt');
        }

        // ── Measurement ──
        function onNotification(event) {
            const data = new Uint8Array(event.target.value.buffer);
            log('📨 Notification: ' + Array.from(data).map(b => b.toString(16).padStart(2, '0')).join(' '));
            parseMeasurement(data);
        }

        function parseMeasurement(data) {
            if (data.length < 6) {
                log('⚠️ Zu wenig Daten: ' + data.length + ' bytes');
                return;
            }

            // Status byte
            const status = data[0];
            if (status !== 0) {
                log('⚠️ Gerätestatus: ' + status);
                return;
            }

            // Distance: 4 bytes little-endian uint32 at offset 2, multiply by 0.05
            const raw = data[2] | (data[3] << 8) | (data[4] << 16) | (data[5] << 24);
            const distanceMm = raw * 0.05;
            
            log(`📏 Messung: ${distanceMm.toFixed(1)} mm (raw: ${raw})`);
            applyValue(distanceMm);
        }

        async function triggerMeasure() {
            if (!connected || !characteristic) {
                log('❌ Nicht verbunden');
                return;
            }

            $('measureBtn').disabled = true;
            log('📏 Sende Mess-Befehl...');

            try {
                // Try writeValueWithResponse first, fallback to writeValueWithoutResponse
                try {
                    await characteristic.writeValueWithResponse(CMD_MEASURE);
                } catch(e) {
                    await characteristic.writeValueWithoutResponse(CMD_MEASURE);
                }
                log('✅ Mess-Befehl gesendet');

                // If no notification mode, read the response
                if (!notifyMode) {
                    setTimeout(async () => {
                        try {
                            const value = await characteristic.readValue();
                            const data = new Uint8Array(value.buffer);
                            log('📨 Antwort: ' + Array.from(data).map(b => b.toString(16).padStart(2, '0')).join(' '));
                            parseMeasurement(data);
                        } catch(e) {
                            log('⚠️ Lesen fehlgeschlagen: ' + e.message);
                        }
                        $('measureBtn').disabled = false;
                    }, 1500);
                    return;
                }
            } catch (err) {
                log('❌ Mess-Fehler: ' + err.message);
            }

            setTimeout(() => { $('measureBtn').disabled = false; }, 500);
        }

        // ── Manual Input ──
        function toggleManual() {
            const el = $('manualInput');
            el.classList.toggle('show');
            if (el.classList.contains('show')) {
                $('manualValue').focus();
            }
        }

        function applyManual() {
            const val = parseFloat($('manualValue').value);
            if (isNaN(val)) return;
            applyValue(val);
            $('manualValue').value = '';
        }

        // Listen for Enter in manual input
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && document.activeElement === $('manualValue')) {
                applyManual();
            }
        });

        // ── Save / Table ──
        function saveDoor() {
            const id = $('doorId').value.trim();
            if (!id) {
                alert('Bitte Tür-Bezeichnung eingeben');
                $('doorId').focus();
                return;
            }

            // Check if door already exists → update
            const existing = measurements.findIndex(m => m.id === id);
            const entry = {
                id,
                breite: currentDoor.breite,
                hoehe: currentDoor.hoehe,
                wandstaerke: currentDoor.wandstaerke,
                timestamp: new Date().toISOString()
            };

            if (existing >= 0) {
                measurements[existing] = entry;
            } else {
                measurements.push(entry);
            }

            save();
            renderTable();
            log(`💾 Tür ${id} gespeichert`);
        }

        function nextDoor() {
            // Auto-save if we have data
            if ($('doorId').value.trim() && (currentDoor.breite || currentDoor.hoehe || currentDoor.wandstaerke)) {
                saveDoor();
            }

            // Increment door number
            const current = $('doorId').value;
            const match = current.match(/^(.*?)(\d+)$/);
            if (match) {
                const num = parseInt(match[2]) + 1;
                $('doorId').value = match[1] + num.toString().padStart(match[2].length, '0');
            } else {
                $('doorId').value = '';
            }

            // Reset fields
            currentDoor = { breite: null, hoehe: null, wandstaerke: null };
            $('val-breite').textContent = '—';
            $('val-hoehe').textContent = '—';
            $('val-wandstaerke').textContent = '—';
            selectField('breite');
            updateMeasureDisplay(null);
        }

        function deleteRow(idx) {
            measurements.splice(idx, 1);
            save();
            renderTable();
        }

        function save() {
            localStorage.setItem('laser-measurements', JSON.stringify(measurements));
        }

        function renderTable() {
            const body = $('dataBody');
            const empty = $('emptyState');
            $('countBadge').textContent = measurements.length;

            if (measurements.length === 0) {
                body.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            body.innerHTML = measurements.map((m, i) => `
                <tr>
                    <td><strong>${m.id}</strong></td>
                    <td>${m.breite ?? '—'}</td>
                    <td>${m.hoehe ?? '—'}</td>
                    <td>${m.wandstaerke ?? '—'}</td>
                    <td><button class="delete-btn" onclick="deleteRow(${i})">✕</button></td>
                </tr>
            `).reverse().join('');
        }

        // ── Export ──
        function exportCSV() {
            if (measurements.length === 0) {
                alert('Keine Messungen zum Exportieren');
                return;
            }

            const header = 'Tür;Breite (mm);Höhe (mm);Wandstärke (mm);Zeitpunkt\n';
            const rows = measurements.map(m => 
                `${m.id};${m.breite ?? ''};${m.hoehe ?? ''};${m.wandstaerke ?? ''};${m.timestamp}`
            ).join('\n');

            const blob = new Blob(['\ufeff' + header + rows], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `tuermasse-${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            log('📥 CSV exportiert');
        }

        function clearAll() {
            if (!confirm('Alle Messungen löschen?')) return;
            measurements = [];
            save();
            renderTable();
            log('🗑️ Alle Messungen gelöscht');
        }

        function toggleLog() {
            $('debugLog').classList.toggle('show');
        }

        // ── Init ──
        renderTable();

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
